name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      CHESS_ANALYZER_DATA: ${{ runner.temp }}/chess-analyzer-data

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Verify imports compile
        run: python -m compileall chess_analyzer tests

  browser:
    runs-on: ubuntu-latest
    env:
      CHESS_ANALYZER_DATA: ${{ runner.temp }}/chess-analyzer-data

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Playwright dependencies
        run: |
          npm ci
          npm run test:e2e:install -- --with-deps chromium

      - name: Run browser smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results

  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Build distributions
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Smoke-test built wheel
        run: |
          python -m venv .pkg-venv
          . .pkg-venv/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          python -m chess_analyzer --version
